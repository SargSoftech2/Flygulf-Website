name: Flygulf Production Deployment

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Source
      uses: actions/checkout@v4

    # LOGIN DOCKERHUB
    - name: Login DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # FRONTEND BUILD
    - name: Build Frontend Image
      run: |
        docker build -f Dockerfile.frontend \
        -t ${{ secrets.DOCKER_USERNAME }}/flygulf-frontend:latest .

    - name: Push Frontend Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/flygulf-frontend:latest

    # JAVA
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    # BUILD JAR
    - name: Build Backend Jar
      run: |
        chmod +x mvnw
        ./mvnw clean package -DskipTests

    # BUILD BACKEND IMAGE
    - name: Build Backend Image
      run: |
        docker build -f Dockerfile.backend \
        -t ${{ secrets.DOCKER_USERNAME }}/flygulf-backend:latest .

    - name: Push Backend Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/flygulf-backend:latest

    # DEPLOY EC2
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}

        script: |
          cd ~/flygulf

          docker compose down

          docker pull ${{ secrets.DOCKER_USERNAME }}/flygulf-frontend:latest
          docker pull ${{ secrets.DOCKER_USERNAME }}/flygulf-backend:latest

          docker compose up -d
